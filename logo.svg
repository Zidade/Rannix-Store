<svg xmlns="http://www.w3.org/2000/svg" width="220" height="55" viewBox="0 0 220 55">
  <defs>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00aaff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00cc66;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Ícone: sinal de rede / R estilizado -->
  <rect x="4" y="4" width="47" height="47" rx="12" fill="url(#gBlue)"/>
  <!-- Barras de sinal -->
  <rect x="13" y="34" width="6" height="10" rx="2" fill="white"/>
  <rect x="23" y="26" width="6" height="18" rx="2" fill="white" opacity="0.9"/>
  <rect x="33" y="17" width="6" height="27" rx="2" fill="white" opacity="0.85"/>
  <!-- Ponto de destaque verde -->
  <circle cx="42" cy="13" r="5" fill="url(#gGreen)"/>

  <!-- Texto RANNIX -->
  <text x="62" y="34" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="24" letter-spacing="1" fill="white">RANNIX</text>

  <!-- Subtexto STORE -->
  <text x="64" y="48" font-family="Arial, sans-serif" font-weight="400"
        font-size="11" letter-spacing="4" fill="#00aaff">STORE</text>
</svg>
